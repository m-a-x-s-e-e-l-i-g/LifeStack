name: lifestack

services:
  clickhouse:
    image: clickhouse/clickhouse-server:24.8
    container_name: lifestack-clickhouse
    restart: unless-stopped
    environment:
      CLICKHOUSE_DB: ${CLICKHOUSE_DB:-lifestack}
      CLICKHOUSE_USER: ${CLICKHOUSE_USER:-lifestack}
      CLICKHOUSE_PASSWORD: ${CLICKHOUSE_PASSWORD:-lifestack}
      CLICKHOUSE_DEFAULT_ACCESS_MANAGEMENT: 1
    ulimits:
      nofile:
        soft: 262144
        hard: 262144
    volumes:
      - clickhouse-data:/var/lib/clickhouse
    ports:
      - "${CLICKHOUSE_HTTP_PORT:-8123}:8123"
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://127.0.0.1:8123/ping || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 20

  backend:
    build: ./backend
    container_name: lifestack-backend
    restart: unless-stopped
    depends_on:
      clickhouse:
        condition: service_healthy
    environment:
      NODE_ENV: production
      BACKEND_PORT: ${BACKEND_PORT:-4000}
      CLICKHOUSE_URL: ${CLICKHOUSE_URL:-http://clickhouse:8123}
      CLICKHOUSE_DB: ${CLICKHOUSE_DB:-lifestack}
      CLICKHOUSE_USER: ${CLICKHOUSE_USER:-lifestack}
      CLICKHOUSE_PASSWORD: ${CLICKHOUSE_PASSWORD:-lifestack}
      LOG_LEVEL: ${LOG_LEVEL:-info}
      # AI assistant (provider-agnostic, OpenAI-compatible). Works with OpenAI,
      # Ollama (/v1), LM Studio, vLLM, etc. Leave blank to configure in Settings.
      AI_BASE_URL: ${AI_BASE_URL:-}
      AI_API_KEY: ${AI_API_KEY:-}
      AI_MODEL: ${AI_MODEL:-}
      # Connector credentials (optional, can also be set in Settings).
      TRAKT_CLIENT_ID: ${TRAKT_CLIENT_ID:-}
      TRAKT_CLIENT_SECRET: ${TRAKT_CLIENT_SECRET:-}
      TRAKT_ACCESS_TOKEN: ${TRAKT_ACCESS_TOKEN:-}
      TIBBER_TOKEN: ${TIBBER_TOKEN:-}
    ports:
      - "${BACKEND_PORT:-4000}:4000"

  frontend:
    build: ./frontend
    container_name: lifestack-frontend
    restart: unless-stopped
    depends_on:
      - backend
    environment:
      NODE_ENV: production
      PORT: ${FRONTEND_PORT:-3000}
      BODY_SIZE_LIMIT: ${FRONTEND_BODY_SIZE_LIMIT:-50M}
      BACKEND_URL: ${BACKEND_URL:-http://backend:4000}
      ORIGIN: ${ORIGIN:-http://localhost:3000}
    ports:
      - "${FRONTEND_PORT:-3000}:3000"

volumes:
  clickhouse-data:
